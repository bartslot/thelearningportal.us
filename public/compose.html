<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>html,body,#map{margin:0;height:100%;width:100%}</style>
</head>
<body>
  <div id="map"></div>
  <script>
    // Hybrid composite proof: AI parchment artwork as a raster IMAGE base, real coastline (thin
    // magenta) + Cliopatria borders (vector) on top — to judge how well the artwork registers
    // with real geography. ?coast=1 shows the alignment check line.
    const q = new URLSearchParams(location.search)
    const O = location.origin
    // bbox the artwork was generated for (from sketch.html getBounds at lng10/lat48/zoom3.4)
    const W=-41.15543, S=20.31561, E=61.15543, N=66.09630
    const map = window.__map = new maplibregl.Map({
      container: 'map', interactive: false, attributionControl: false,
      style: {
        version: 8,
        sources: {
          art: { type: 'image', url: `${O}/maptiles/europe-art.png`, coordinates: [[W,N],[E,N],[E,S],[W,S]] },
          land: { type: 'vector', tiles: [`${O}/land-tiles/{z}/{x}/{y}.pbf`], maxzoom: 4 },
          cliopatria: { type: 'vector', tiles: [`${O}/cliopatria-tiles/{z}/{x}/{y}.pbf`], maxzoom: 4 },
        },
        layers: [
          { id: 'bg', type: 'background', paint: { 'background-color': '#cfc6ad' } },
          { id: 'art', type: 'raster', source: 'art', paint: { 'raster-opacity': 1 } },
          ...(q.get('coast') ? [{ id: 'coast', type: 'line', source: 'land', 'source-layer': 'land', paint: { 'line-color': '#e0218a', 'line-width': 1, 'line-opacity': 0.7 } }] : []),
          { id: 'borders', type: 'line', source: 'cliopatria', 'source-layer': 'boundaries',
            filter: ['all', ['==',['get','Type'],'POLITY'], ['<=',['to-number',['get','FromYear']],1600], ['>=',['to-number',['get','ToYear']],1600]],
            paint: { 'line-color': '#3a2c1a', 'line-width': 0.8, 'line-opacity': 0.5 } },
        ],
      },
      center: [10, 48], zoom: 3.4,
    })
    map.on('idle', () => { document.title = 'COMPOSE-READY' })
  </script>
</body>
</html>
