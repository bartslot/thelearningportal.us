    <polygon fill="none" stroke="#3a2c1c" stroke-width="1.1" stroke-linejoin="round"
             points="8,2 11,10 9,10 12.5,16 10.5,16 14,22 2,22 5.5,16 3.5,16 7,10 5,10"/>
