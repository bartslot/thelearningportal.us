<?xml version="1.0" encoding="UTF-8"?>
<svg id="tree" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 18">
  <g id="small">
    <!-- #bg: land-coloured silhouette so overlapping canopies occlude into one forest mass. -->
    <polygon id="bg" fill="#e8dec4" points="6,1.5 9,9 7,9 11,15 1,15 5,9 3,9"/>
    <line x1="6" y1="17.5" x2="6" y2="14.5" stroke="#3a2c1c" stroke-width="1.2" stroke-linecap="round"/>
    <polygon fill="none" stroke="#3a2c1c" stroke-width="1" stroke-linejoin="round"
             points="6,1.5 9,9 7,9 11,15 1,15 5,9 3,9"/>
  </g>
</svg>
